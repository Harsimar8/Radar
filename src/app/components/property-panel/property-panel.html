@if (simulationService.selectedEntity(); as entity) {

<h2>{{ entity.name }}</h2>

<p><b>Type:</b> {{ entity.type }}</p>

<p><b>Latitude:</b> {{ entity.position.latitude }}</p>

<p><b>Longitude:</b> {{ entity.position.longitude }}</p>

<button (click)="removeSelected()">
    Delete Entity
</button>

}
